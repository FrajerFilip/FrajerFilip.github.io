<!DOCTYPE html>
<html lang="cs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzeum Praha</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="hero">
        <nav class="navbar">

            <div class="logo">
                <img src="img/logo.png" alt="Logo muzea">
                <span>Muzeum Frajer</span>
            </div>

            <ul class="nav-links">
                <li><a href="#expozice">Expozice</a></li>
                <li><a href="#premium">Premium</a></li>
                <li><a href="#recenze">Recenze</a></li>
                <li><a href="#faq">FAQ</a></li>
                <li><a href="#rezervace">Rezervace</a></li>
                <li><a href="#kontakt">Kontakt</a></li>
            </ul>

            <div class="burger" id="burger">
                ☰
            </div>

        </nav>

        <div class="hero-content">
            <h1>Objevte historii a umění</h1>

            <p>
                Moderní muzeum s interaktivními expozicemi a unikátními výstavami.
            </p>

            <a href="#rezervace" class="btn">
                Rezervovat vstupenku
            </a>
        </div>
    </header>

    <section id="expozice" class="section">
        <h2>Naše expozice</h2>

        <div class="cards" id="cards-container">
            <!-- Karty se načtou z CSV -->
        </div>
    </section>

    <script>
        async function loadCSV() {

            const response = await fetch("expozice.csv");
            const data = await response.text();

            const rows = data.trim().split("\n").slice(1);

            const container = document.getElementById("cards-container");

            rows.forEach(row => {

                const cols = row.split(";");

                const nazev = cols[0];
                const popis = cols[1];
                const kategorie = cols[2];
                const obrazek = cols[3];

                const card = `
                    <div class="card">

                        <img src="${obrazek}" alt="${nazev}">

                        <div class="card-content">

                            <span class="category">
                                ${kategorie}
                            </span>

                            <h3>
                                ${nazev}
                            </h3>

                            <p>
                                ${popis}
                            </p>

                        </div>

                    </div>
                `;

                container.innerHTML += card;

            });

        }

        loadCSV();
    </script>

</body>

</html>
